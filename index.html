<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akshai & Aparna | Wedding Reception</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom, #fff6f9, #f8f3ff);
    color: #5a4a52;
    text-align: center;
    scroll-behavior: smooth;
}

.section {
    padding: 80px 20px;
    opacity: 0;
    transform: translateY(40px);
    transition: all 1s ease;
}

.section.show {
    opacity: 1;
    transform: translateY(0);
}

.hero {
    height: 100vh;
    background: linear-gradient(rgba(255, 240, 245, 0.6), rgba(248, 243, 255, 0.6)),
    url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1600&q=80');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    color: #6d4c57;
}

.hero h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 75px;
    margin: 10px 0;
}

.hero p {
    font-size: 20px;
    letter-spacing: 2px;
}

h2 {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    margin-bottom: 20px;
    color: #b76e79;
}

.card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    max-width: 750px;
    margin: auto;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(183,110,121,0.15);
}

button {
    background: #b76e79;
    color: white;
    border: none;
    padding: 12px 28px;
    margin-top: 15px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.4s;
}

button:hover {
    background: #9c5a65;
}

.countdown {
    font-size: 24px;
    margin-top: 20px;
    color: #b76e79;
}

.gallery {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.gallery img {
    width: 260px;
    height: 320px;
    object-fit: cover;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.6s ease;
    box-shadow: 0 10px 30px rgba(183,110,121,0.25);
}

.gallery img:hover {
    transform: scale(1.05);
}

.lightbox {
    display: none;
    position: fixed;
    z-index: 999;
    padding-top: 60px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(255,240,245,0.95);
}

.lightbox img {
    display: block;
    margin: auto;
    max-width: 85%;
    max-height: 85%;
    border-radius: 20px;
}

/* Wishes Box */
input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 15px;
    border: 1px solid #e6cbd1;
    font-family: 'Poppins', sans-serif;
}

textarea {
    height: 90px;
    resize: none;
}

.wishes-list {
    margin-top: 30px;
    text-align: left;
    max-height: 300px;
    overflow-y: auto;
}

.wish {
    background: rgba(255, 240, 245, 0.6);
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(183,110,121,0.15);
}

.footer {
    background: #b76e79;
    color: white;
    padding: 25px;
}

@media(max-width:768px){
    .hero h1 { font-size: 55px; }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <p>With the blessings of our elders</p>
    <h1>Akshai & Aparna</h1>
    <p>05 April 2026</p>
</div>

<!-- LIVE WISHES -->
<div class="section">
    <div class="card">
        <h2>Send Your Wishes 💕</h2>
        <input type="text" id="name" placeholder="Your Name">
        <textarea id="message" placeholder="Write your blessing..."></textarea>
        <button onclick="sendWish()">Send Wish</button>
        <div id="wishes-list" class="wishes-list"></div>
    </div>
</div>

<div class="footer">
    We look forward to celebrating with you ❤️
</div>

<!-- FIREBASE SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "akshai-aparna-wedding.firebaseapp.com",
  databaseURL: "https://akshai-aparna-wedding-default-rtdb.firebaseio.com",
  projectId: "akshai-aparna-wedding",
  storageBucket: "akshai-aparna-wedding.firebasestorage.app",
  messagingSenderId: "336537700289",
  appId: "1:336537700289:web:ff966a27768443b3fa5140"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.sendWish = function() {
    const name = document.getElementById("name").value.trim();
    const message = document.getElementById("message").value.trim();
    if(name === "" || message === "") {
        alert("Please fill in both fields ❤️");
        return;
    }
    push(ref(db, "wishes"), {
        name: name,
        message: message,
        time: serverTimestamp()
    });
    document.getElementById("name").value = "";
    document.getElementById("message").value = "";
};

const wishesList = document.getElementById("wishes-list");

onChildAdded(ref(db, "wishes"), (snapshot) => {
    const wish = snapshot.val();
    const wishDiv = document.createElement("div");
    wishDiv.classList.add("wish");

    const date = wish.time ? new Date(wish.time).toLocaleString() : "";

    wishDiv.innerHTML = `
        <strong>${wish.name}</strong>
        <div style="font-size:12px; opacity:0.6;">${date}</div>
        <div>${wish.message}</div>
    `;

    wishesList.prepend(wishDiv);
});
</script>

</body>
</html>
